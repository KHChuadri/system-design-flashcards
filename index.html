<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Primer Flashcards</title>
<style>
  :root{
    --bg:#0e1117; --card:#161b22; --card2:#1c2230; --accent:#58a6ff;
    --accent2:#3fb950; --text:#e6edf3; --muted:#8b949e; --border:#30363d;
    --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1a2233 0%,var(--bg) 60%);
    color:var(--text);min-height:100vh;display:flex;flex-direction:column;
    align-items:center;padding:32px 16px;
  }
  h1{font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.9rem;margin-top:6px;text-align:center}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:22px 0 8px}
  button{
    background:var(--card2);color:var(--text);border:1px solid var(--border);
    padding:9px 16px;border-radius:10px;font-size:.85rem;cursor:pointer;
    transition:.15s;font-weight:500;
  }
  button:hover{border-color:var(--accent);color:var(--accent)}
  button:active{transform:translateY(1px)}
  select{
    background:var(--card2);color:var(--text);border:1px solid var(--border);
    padding:9px 12px;border-radius:10px;font-size:.85rem;cursor:pointer;font-weight:500;
  }
  .progress{color:var(--muted);font-size:.85rem;margin:14px 0 4px;font-variant-numeric:tabular-nums}
  .stage{perspective:1600px;width:100%;max-width:560px;margin-top:8px}
  .card{
    position:relative;width:100%;min-height:320px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1);
  }
  .card.flipped{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
    padding:34px 30px;display:flex;flex-direction:column;justify-content:center;
    border:1px solid var(--border);box-shadow:var(--shadow);
  }
  .front{background:linear-gradient(160deg,#1b2230,#12161d)}
  .back{background:linear-gradient(160deg,#13231a,#0f1a14);transform:rotateY(180deg);border-color:#1f3a2a}
  .tag{
    align-self:flex-start;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);background:rgba(88,166,255,.12);padding:4px 10px;border-radius:999px;
    margin-bottom:18px;font-weight:600;
  }
  .back .tag{color:var(--accent2);background:rgba(63,185,80,.12)}
  .q{font-size:1.2rem;font-weight:600;line-height:1.45}
  .a{font-size:.98rem;line-height:1.55;color:#d7e3da}
  .a ul{margin:8px 0 0 18px}
  .a li{margin:3px 0}
  .hint{position:absolute;bottom:14px;right:18px;font-size:.72rem;color:var(--muted)}
  .nav{display:flex;gap:12px;margin-top:22px;align-items:center}
  .nav button{min-width:110px}
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:560px;margin-top:20px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border);cursor:pointer;transition:.15s}
  .dot.active{background:var(--accent);transform:scale(1.3)}
  .dot.known{background:var(--accent2)}
  kbd{background:#0b0f14;border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:.72rem;color:var(--muted)}
  .foot{color:var(--muted);font-size:.78rem;margin-top:24px;text-align:center}
</style>
</head>
<body>
  <h1>System Design Primer — Flashcards</h1>
  <div class="sub">From donnemartin/system-design-primer · default order follows the guide top-to-bottom · click card or press <kbd>Space</kbd> to flip</div>

  <div class="toolbar">
    <button id="shuffleBtn">🔀 Shuffle</button>
    <button id="resetBtn">↺ Reset order</button>
    <button id="knownBtn">✓ Mark known</button>
    <button id="hideKnownBtn">Hide known: off</button>
    <select id="topicFilter"><option value="all">All topics</option></select>
  </div>

  <div class="progress" id="progress"></div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <span class="tag" id="frontTag">Question</span>
        <div class="q" id="qText"></div>
        <div class="hint">click to reveal →</div>
      </div>
      <div class="face back">
        <span class="tag" id="backTag">Answer</span>
        <div class="a" id="aText"></div>
        <div class="hint">← click to hide</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn">← Prev</button>
    <button id="nextBtn">Next →</button>
  </div>

  <div class="dots" id="dots"></div>

  <div class="foot">Keys: <kbd>←</kbd> <kbd>→</kbd> navigate · <kbd>Space</kbd> flip · <kbd>K</kbd> mark known</div>

<script>
const cards = [
  // --- Performance vs scalability ---
  { tag:"Perf vs scale", q:"Performance vs scalability — what's the distinction?",
    a:"A service is <b>scalable</b> if performance grows proportionally to resources added. Rule of thumb: a <b>performance</b> problem = slow for a single user; a <b>scalability</b> problem = fast for one user but slow under heavy load." },

  // --- Latency vs throughput ---
  { tag:"Latency vs throughput", q:"Latency vs throughput — define each and what to aim for.",
    a:"<b>Latency</b> = time to perform an action / produce a result. <b>Throughput</b> = number of actions or results per unit of time. Aim for <b>maximal throughput</b> with <b>acceptable latency</b>." },

  // --- CAP theorem ---
  { tag:"CAP theorem", q:"State the CAP theorem and its three guarantees.",
    a:"In a distributed system you can only support <b>two of three</b>:<ul><li><b>Consistency</b> — every read gets the most recent write or an error</li><li><b>Availability</b> — every request gets a response (not guaranteed latest)</li><li><b>Partition tolerance</b> — system keeps working despite network partitions</li></ul>Networks fail, so you must take P. The real tradeoff is C vs A." },
  { tag:"CAP theorem", q:"CP vs AP — when do you choose each?",
    a:"<b>CP</b> (consistency + partition tolerance): waiting on a partitioned node may time out. Good when you need atomic reads/writes.<br><br><b>AP</b> (availability + partition tolerance): returns the most readily available version (maybe stale); writes propagate once the partition resolves. Good when eventual consistency is acceptable or the system must keep working through failures." },

  // --- Consistency patterns ---
  { tag:"Consistency patterns", q:"Weak vs eventual vs strong consistency?",
    a:"<ul><li><b>Weak</b> — after a write, reads may or may not see it (best effort). E.g. memcached; VoIP, video chat, realtime games.</li><li><b>Eventual</b> — reads eventually see it (usually ms); async replication. E.g. DNS, email; highly available systems.</li><li><b>Strong</b> — reads see it immediately; synchronous replication. E.g. filesystems, RDBMS; systems needing transactions.</li></ul>" },

  // --- Availability patterns: fail-over ---
  { tag:"Availability", q:"Active-passive fail-over — how does it work?",
    a:"Heartbeats run between the active server and a passive standby. If the heartbeat breaks, the passive takes over the active's IP and resumes service. Downtime depends on whether standby is 'hot' (running) or 'cold' (needs startup). Only the active handles traffic. Aka master-slave failover." },
  { tag:"Availability", q:"Active-active fail-over — how does it differ?",
    a:"Both servers manage traffic, spreading load between them. Public-facing: DNS must know both public IPs. Internal-facing: app logic must know both servers. Aka master-master failover." },
  { tag:"Availability", q:"Disadvantages of fail-over?",
    a:"Adds more hardware and complexity. Potential data loss if the active fails before newly written data is replicated to the passive." },
  { tag:"Availability", q:"Availability in numbers — what does '99.99%' (four 9s) mean, and parallel vs sequence?",
    a:"Availability = uptime % , measured in '9s'. 99.9% = three 9s (~8.76h downtime/yr), 99.99% = four 9s (~52.6 min/yr).<br><br><b>In sequence:</b> Total = A(Foo) × A(Bar) — decreases (two 99.9% → 99.8%).<br><b>In parallel:</b> Total = 1 − (1−A(Foo))(1−A(Bar)) — increases (two 99.9% → 99.9999%)." },

  // --- DNS ---
  { tag:"DNS", q:"What is DNS and what are the key record types?",
    a:"Domain Name System translates a domain (www.example.com) to an IP. Hierarchical, cached at multiple levels (browser/OS/resolver) bounded by TTL.<ul><li><b>NS</b> — name server for the domain</li><li><b>MX</b> — mail servers</li><li><b>A</b> — name → IP address</li><li><b>CNAME</b> — name → another name / A record</li></ul>Managed services: CloudFlare, Route 53. Routing: weighted round robin, latency-based, geolocation-based." },
  { tag:"DNS", q:"Disadvantages of DNS?",
    a:"Slight lookup delay (mitigated by caching). Management can be complex. DNS has been targeted by DDoS attacks, blocking access to sites unless users know the raw IP." },

  // --- CDN ---
  { tag:"CDN", q:"What is a CDN and how does it improve performance?",
    a:"A globally distributed network of proxy servers serving content from locations close to the user. Usually static (HTML/CSS/JS, images, video); some serve dynamic. Helps two ways: users get content from nearby data centers, and your origin servers offload requests the CDN fulfills." },
  { tag:"CDN", q:"Push vs pull CDN?",
    a:"<b>Push</b> — you upload content to the CDN when it changes; you control expiry. Best for low traffic / rarely-changed content. Minimizes traffic, maximizes storage.<br><br><b>Pull</b> — CDN grabs content from your origin on first request, cached per TTL. First request is slower. Best for heavy traffic. Minimizes storage but can create redundant pulls when files expire unchanged." },
  { tag:"CDN", q:"Disadvantages of a CDN?",
    a:"Costs can be significant with traffic. Content may be stale if updated before TTL expires. Requires rewriting URLs for static content to point to the CDN." },

  // --- Load balancer ---
  { tag:"Load balancer", q:"What does a load balancer do, and what are its benefits?",
    a:"Distributes incoming requests across compute resources (app servers, DBs). Benefits: prevents routing to unhealthy servers, prevents overload, eliminates a single point of failure. Extras: <b>SSL termination</b> (offload decrypt/encrypt, no per-server certs) and <b>session persistence</b> (cookies route a client to the same instance). Can be hardware or software (HAProxy). Set up in active-passive or active-active." },
  { tag:"Load balancer", q:"What metrics can a load balancer route on?",
    a:"Random, least loaded, session/cookies, round robin or weighted round robin, Layer 4, and Layer 7." },
  { tag:"Load balancer", q:"Layer 4 vs Layer 7 load balancing?",
    a:"<b>L4</b> — looks at transport-layer info (source/dest IP and ports, not packet contents); forwards packets, does NAT. Less time/compute.<br><br><b>L7</b> — looks at the application layer (header, message, cookies); terminates traffic, reads message, decides, opens connection to chosen server. E.g. route video traffic vs billing traffic differently. More flexible, at higher cost." },
  { tag:"Load balancer", q:"Horizontal vs vertical scaling — and horizontal's drawbacks?",
    a:"<b>Horizontal</b> = scale out with commodity machines (cheaper, higher availability, easier hiring). <b>Vertical</b> = scale up one bigger box.<br><br>Drawbacks of horizontal: adds complexity, requires cloning; servers must be <b>stateless</b> (no local sessions/profile data — store in a shared DB or cache like Redis/Memcached); downstream caches/DBs handle more connections." },
  { tag:"Load balancer", q:"Disadvantages of a load balancer?",
    a:"Can become a performance bottleneck if under-resourced or misconfigured. Adds complexity. A single LB is itself a single point of failure; multiple LBs add further complexity." },

  // --- Reverse proxy ---
  { tag:"Reverse proxy", q:"What is a reverse proxy and what benefits does it add?",
    a:"A web server that centralizes internal services behind a unified public interface; forwards client requests to a backend and returns its response. Benefits: increased security (hides backends, IP blacklisting, connection limits), scalability/flexibility (clients only see proxy IP), SSL termination, compression, caching, and serving static content directly." },
  { tag:"Reverse proxy", q:"Load balancer vs reverse proxy?",
    a:"A <b>load balancer</b> is useful when you have multiple servers, routing traffic across servers serving the same function. A <b>reverse proxy</b> is useful even with a single server, for its security/caching/compression benefits. NGINX and HAProxy can do both (L7)." },

  // --- Application layer ---
  { tag:"Application layer", q:"Why separate the web layer from the application layer?",
    a:"Lets you scale and configure each independently — a new API adds app servers without necessarily adding web servers. Follows the <b>single responsibility principle</b>: small, autonomous services that work together; small teams can iterate fast. Workers here also enable asynchronism." },
  { tag:"Application layer", q:"Microservices and service discovery — what are they?",
    a:"<b>Microservices</b> — a suite of independently deployable, small, modular services, each running a unique process and communicating via a lightweight mechanism (e.g. Pinterest: user profile, follower, feed, search, photo upload).<br><br><b>Service discovery</b> — systems like Consul, Etcd, Zookeeper track registered names/addresses/ports so services find each other; health checks verify integrity; built-in key-value stores hold shared config." },

  // --- RDBMS / ACID ---
  { tag:"RDBMS", q:"What does ACID stand for (relational DB transactions)?",
    a:"<ul><li><b>Atomicity</b> — each transaction is all or nothing</li><li><b>Consistency</b> — any transaction brings the DB from one valid state to another</li><li><b>Isolation</b> — concurrent execution gives the same result as serial execution</li><li><b>Durability</b> — once committed, it stays committed</li></ul>" },
  { tag:"RDBMS", q:"Name the techniques to scale a relational database.",
    a:"Master-slave replication, master-master replication, federation, sharding, denormalization, and SQL tuning." },
  { tag:"RDBMS", q:"Master-slave vs master-master replication?",
    a:"<b>Master-slave</b> — master serves reads+writes, replicates writes to read-only slaves. If master dies, system is read-only until a slave is promoted.<br><br><b>Master-master</b> — both serve reads+writes and coordinate. If one dies, reads+writes continue. Needs an LB or app logic to route writes; often loosely consistent or higher write latency; conflict resolution grows with write nodes." },
  { tag:"RDBMS", q:"General disadvantages of replication?",
    a:"Potential data loss if master fails before replicating. Read replicas can get bogged down replaying many writes (less capacity for reads). More replicas → greater replication lag. Adds hardware and complexity." },
  { tag:"RDBMS", q:"What is federation (functional partitioning)?",
    a:"Splits databases by function — e.g. separate <b>forums</b>, <b>users</b>, <b>products</b> DBs instead of one monolith. Less read/write traffic and replication lag per DB; more data fits in memory → more cache hits; parallel writes (no single master) → higher throughput.<br><br>Cons: ineffective if schema needs huge functions/tables; app must route to the right DB; cross-DB joins are complex; more hardware/complexity." },
  { tag:"RDBMS", q:"What is sharding?",
    a:"Distributes data across DBs so each holds a subset (e.g. shard users by last-name initial or geography). Benefits like federation: less traffic/replication, more cache hits, smaller indexes → faster queries; one shard down ≠ all down.<br><br>Cons: app logic must handle shards (complex queries); data can become lopsided (hot shards) → rebalancing (consistent hashing helps); cross-shard joins complex; more hardware/complexity." },
  { tag:"RDBMS", q:"What is denormalization and when is it worth it?",
    a:"Improves read performance at the expense of write performance by writing redundant copies across tables to avoid expensive joins (materialized views in PostgreSQL/Oracle help). Useful once data is distributed (federation/sharding) where cross-center joins are costly, and because reads often outnumber writes 100:1 or 1000:1.<br><br>Cons: data duplicated; constraints needed to keep copies in sync; can perform worse under heavy write load." },
  { tag:"RDBMS", q:"SQL tuning — benchmark vs profile, and common optimizations?",
    a:"<b>Benchmark</b> — simulate high load (e.g. ab). <b>Profile</b> — enable tools like the slow query log to find bottlenecks.<br><br>Optimizations: tighten schema (CHAR for fixed-length, TEXT for large blocks, INT/DECIMAL appropriately, NOT NULL), use good indices (B-trees → log-time search, but slow writes/use space), avoid expensive joins (denormalize), partition tables (hot spots), tune the query cache." },

  // --- NoSQL ---
  { tag:"NoSQL", q:"What does BASE describe, and how does it relate to CAP?",
    a:"BASE describes NoSQL properties; vs CAP it chooses <b>availability over consistency</b>:<ul><li><b>Basically available</b> — system guarantees availability</li><li><b>Soft state</b> — state may change over time without input</li><li><b>Eventual consistency</b> — becomes consistent over time absent new input</li></ul>" },
  { tag:"NoSQL", q:"Key-value store — abstraction and use cases?",
    a:"Abstraction: <b>hash table</b>. Generally O(1) reads/writes, backed by memory/SSD; keys can be kept in lexicographic order for range scans. High performance, simple/rapidly-changing data, in-memory cache layer. Limited operations push complexity to the app. Basis for document stores and some graph DBs." },
  { tag:"NoSQL", q:"Document store — abstraction and use cases?",
    a:"Abstraction: <b>key-value store with documents (XML/JSON/binary) as values</b>; a document holds all info for an object. Query by the document's internal structure; organized by collections/tags/metadata. Documents in a collection can have different fields. E.g. MongoDB, CouchDB, DynamoDB. High flexibility; good for occasionally-changing data." },
  { tag:"NoSQL", q:"Wide column store — abstraction and use cases?",
    a:"Abstraction: nested map <code>ColumnFamily&lt;RowKey, Columns&lt;ColKey, Value, Timestamp&gt;&gt;</code>. Basic unit is a column (name/value); grouped into column families (≈ table). Values carry timestamps for versioning/conflict resolution. E.g. Google Bigtable → HBase, Cassandra. High availability/scalability; very large data sets." },
  { tag:"NoSQL", q:"Graph database — abstraction and use cases?",
    a:"Abstraction: <b>graph</b>. Each node is a record, each arc a relationship. Optimized for complex relationships / many-to-many (e.g. social networks). High performance for connected data, but newer, fewer tools; often accessed via REST APIs. E.g. Neo4j." },
  { tag:"SQL or NoSQL", q:"When to choose SQL vs NoSQL?",
    a:"<b>SQL</b>: structured data, strict schema, relational data, complex joins, transactions, clear scaling patterns, fast index lookups, mature ecosystem.<br><br><b>NoSQL</b>: semi-structured/flexible schema, non-relational, no complex joins, many TB/PB, very data-intensive, very high IOPS throughput. Good for clickstream/logs, leaderboards, shopping carts, hot tables, metadata/lookup tables." },

  // --- Cache ---
  { tag:"Cache", q:"Why cache, and where can caching live?",
    a:"Improves page load times and reduces load on servers/DBs; absorbs uneven load and traffic spikes (popular items skew DB partition distribution). Locations: client (OS/browser), CDN, web server (reverse proxy / Varnish), database, and application (in-memory: Memcached, Redis). Cache levels fall into <b>DB query</b> and <b>object</b> categories." },
  { tag:"Cache", q:"Caching at the query level vs object level?",
    a:"<b>Query level</b> — hash the query as the key, store the result. Suffers expiration issues: hard to invalidate complex queries; one cell change forces deleting all queries that touch it.<br><br><b>Object level</b> — treat data as an object/class instance assembled from the DB; drop it when underlying data changes; enables async assembly by workers. Good to cache: user sessions, fully rendered pages, activity streams, user graph data." },
  { tag:"Cache", q:"Cache-aside (lazy loading) — how does it work and its cons?",
    a:"App manages cache and storage; cache doesn't touch storage. On read: look in cache → miss → load from DB → add to cache → return. Only requested data is cached. Used by Memcached.<br><br>Cons: each miss = three trips (delay); data can go stale (mitigate with TTL or write-through); a new/empty node after failure raises latency." },
  { tag:"Cache", q:"Write-through — how does it work and its cons?",
    a:"App treats the cache as main data store; cache synchronously writes to the DB. Write path: app adds/updates cache → cache writes to DB → return. Slow writes but fast subsequent reads, and cache is never stale (users tolerate write latency more than read latency).<br><br>Cons: new nodes miss until entries are updated in DB (pair with cache-aside); most written data may never be read (mitigate with TTL)." },
  { tag:"Cache", q:"Write-behind (write-back) — how does it work and its cons?",
    a:"App adds/updates the cache, then <b>asynchronously</b> writes to the data store, improving write performance.<br><br>Cons: possible data loss if cache goes down before contents reach the store; more complex to implement than cache-aside or write-through." },
  { tag:"Cache", q:"Refresh-ahead — how does it work and its cons?",
    a:"Cache automatically refreshes recently accessed entries before they expire. Can reduce latency vs read-through if the cache accurately predicts what's needed next.<br><br>Con: inaccurate prediction yields worse performance than no refresh-ahead." },
  { tag:"Cache", q:"General disadvantages of caching?",
    a:"Must maintain consistency between cache and source of truth via cache invalidation — a hard problem with extra complexity around when to update. Requires app changes (e.g. adding Redis/Memcached)." },

  // --- Asynchronism ---
  { tag:"Asynchronism", q:"Message queue vs task queue?",
    a:"<b>Message queue</b> — receives, holds, delivers messages. Workflow: app publishes a job and notifies the user; a worker picks it up, processes, signals done. User isn't blocked. E.g. Redis (simple, can lose messages), RabbitMQ (AMQP), Amazon SQS (hosted, possible double-delivery).<br><br><b>Task queue</b> — receives tasks + data, runs them, delivers results; supports scheduling and heavy background jobs. E.g. Celery (Python)." },
  { tag:"Asynchronism", q:"What is back pressure?",
    a:"If queues grow beyond memory, you get cache misses, disk reads, slower performance. Back pressure limits queue size to maintain throughput and good response times. When full, clients get a server-busy / HTTP 503 to retry later, ideally with exponential backoff." },

  // --- Communication: HTTP ---
  { tag:"HTTP", q:"What is HTTP, and which verbs are idempotent/safe/cacheable?",
    a:"A request/response protocol to encode and transport data between client and server; self-contained, flows through intermediaries (LB, cache, encryption, compression). Relies on TCP/UDP.<ul><li><b>GET</b> reads — idempotent, safe, cacheable</li><li><b>POST</b> creates/processes — not idempotent/safe, cacheable if fresh</li><li><b>PUT</b> creates/replaces — idempotent, not safe/cacheable</li><li><b>PATCH</b> partial update — not idempotent, cacheable if fresh</li><li><b>DELETE</b> — idempotent, not safe/cacheable</li></ul>" },

  // --- TCP ---
  { tag:"TCP", q:"What is TCP and what guarantees does it provide?",
    a:"Connection-oriented protocol over IP, set up/torn down via handshake. Guarantees packets arrive in order and uncorrupted via sequence numbers + checksums, ACKs + automatic retransmission. Also does flow control and congestion control — which add delay, making it less efficient than UDP. Connection pooling helps with high connection counts. Use for reliable, less time-critical apps: web, DB, SMTP, FTP, SSH." },

  // --- UDP ---
  { tag:"UDP", q:"What is UDP and when do you use it over TCP?",
    a:"Connectionless; datagrams may arrive out of order or not at all; no congestion control → more efficient. Can broadcast to a subnet (useful for DHCP before a client has an IP). Good for realtime: VoIP, video chat, streaming, multiplayer games.<br><br>Use UDP over TCP when: you need lowest latency, late data is worse than lost data, or you'll implement your own error correction." },

  // --- RPC ---
  { tag:"RPC", q:"What is RPC and what are its drawbacks?",
    a:"A client invokes a procedure that executes in another address space (usually a remote server), coded like a local call. Client stub marshals id+args → comms modules send → server stub unmarshals and calls the procedure; response reverses. Frameworks: Protobuf, Thrift, Avro. Focused on <b>exposing behaviors</b>; common for internal comms / performance.<br><br>Cons: clients tightly coupled to implementation; new API per operation; hard to debug; harder to leverage existing tech (e.g. caching)." },

  // --- REST ---
  { tag:"REST", q:"What is REST and its four qualities?",
    a:"An architectural style: a client acts on resources managed by a server; all communication is stateless and cacheable. Focused on <b>exposing data</b>, minimizes client/server coupling, great for horizontal scaling. Four qualities:<ul><li>Identify resources (URI)</li><li>Change with representations (HTTP verbs/headers/body)</li><li>Self-descriptive error messages (status codes)</li><li>HATEOAS (browseable service)</li></ul>" },
  { tag:"REST", q:"Disadvantages of REST?",
    a:"Poor fit when resources aren't a simple hierarchy (e.g. 'records updated in the last hour matching events'). Limited verbs sometimes don't fit (e.g. moving docs to archive). Nested resources need multiple round trips (bad on mobile networks). Responses bloat over time as fields are added that old clients don't need → larger payloads/latency." },

  // --- Security ---
  { tag:"Security", q:"What are the security basics for a system design interview?",
    a:"<ul><li>Encrypt in transit and at rest</li><li>Sanitize all user inputs / exposed parameters to prevent XSS and SQL injection</li><li>Use parameterized queries against SQL injection</li><li>Apply the principle of least privilege</li></ul>" },

  // --- Appendix ---
  { tag:"Appendix", q:"Powers of two — key approximate values for capacity estimates.",
    a:"2^10 ≈ 1 thousand = 1 KB · 2^20 ≈ 1 million = 1 MB · 2^30 ≈ 1 billion = 1 GB · 2^40 ≈ 1 trillion = 1 TB. (2^32 ≈ 4 billion = 4 GB.) Handy for back-of-the-envelope sizing." },
  { tag:"Appendix", q:"Latency numbers every programmer should know — the rough hierarchy.",
    a:"L1 ref 0.5 ns · branch mispredict 5 ns · L2 ref 7 ns · mutex 25 ns · main memory 100 ns · 1 KB over 1 Gbps 10 µs · read 4 KB from SSD 150 µs · read 1 MB from memory 250 µs · datacenter round trip 500 µs · read 1 MB from SSD 1 ms · HDD seek 10 ms · 1 MB from HDD 30 ms · CA→Netherlands→CA round trip 150 ms.<br><br>Takeaways: memory is fast, disk slow, network slower; ~2,000 round trips/sec within a datacenter, ~6–7 worldwide/sec." },
  { tag:"Interview", q:"The 4 steps to approach a system design interview question.",
    a:"<ol><li><b>Outline use cases, constraints, assumptions</b> — who/how many users, inputs/outputs, data volume, QPS, read:write ratio</li><li><b>Create a high-level design</b> — sketch main components and connections; justify</li><li><b>Design core components</b> — dive into each (schema, APIs, algorithms)</li><li><b>Scale the design</b> — find bottlenecks; apply LB, horizontal scaling, caching, sharding; discuss trade-offs</li></ol>Everything is a trade-off." },
];

let order = cards.map((_,i)=>i);
let pos = 0;
let hideKnown = false;
let topic = 'all';
const known = new Set();

const cardEl = document.getElementById('card');
const qText = document.getElementById('qText');
const aText = document.getElementById('aText');
const frontTag = document.getElementById('frontTag');
const backTag = document.getElementById('backTag');
const dots = document.getElementById('dots');
const progress = document.getElementById('progress');
const topicFilter = document.getElementById('topicFilter');

// populate topic dropdown in first-seen (file) order
const seen = [];
cards.forEach(c=>{ if(!seen.includes(c.tag)) seen.push(c.tag); });
seen.forEach(t=>{
  const o=document.createElement('option'); o.value=t; o.textContent=t; topicFilter.appendChild(o);
});

function baseOrder(){
  return order.filter(i => topic==='all' || cards[i].tag===topic);
}
function visibleOrder(){
  const b = baseOrder();
  return hideKnown ? b.filter(i=>!known.has(i)) : b;
}
function clampPos(){
  const v = visibleOrder();
  if(v.length===0){pos=0;return;}
  if(pos>=v.length) pos=v.length-1;
  if(pos<0) pos=0;
}
function current(){
  const v = visibleOrder();
  return v.length? v[pos] : null;
}
function render(){
  clampPos();
  const v = visibleOrder();
  const idx = current();
  cardEl.classList.remove('flipped');
  if(idx===null){
    qText.textContent = "All cards marked known 🎉";
    aText.textContent = "Turn off 'Hide known' or reset to review again.";
    frontTag.textContent="Done"; backTag.textContent="Done";
    progress.textContent = `0 / 0 · ${known.size} known`;
    dots.innerHTML=""; return;
  }
  const c = cards[idx];
  frontTag.textContent = c.tag;
  backTag.textContent = c.tag;
  qText.innerHTML = c.q;
  aText.innerHTML = c.a;
  progress.textContent = `${pos+1} / ${v.length}${known.has(idx)?" · known ✓":""} · ${known.size} known total`;
  dots.innerHTML="";
  v.forEach((cardIdx,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===pos?' active':'')+(known.has(cardIdx)?' known':'');
    d.onclick=()=>{pos=i;render();};
    dots.appendChild(d);
  });
}
function flip(){ if(current()!==null) cardEl.classList.toggle('flipped'); }
function next(){ const v=visibleOrder(); if(pos<v.length-1){pos++;render();} }
function prev(){ if(pos>0){pos--;render();} }
function shuffle(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  pos=0;render();
}
function resetOrder(){ order=cards.map((_,i)=>i); pos=0; render(); }
function toggleKnown(){
  const idx=current(); if(idx===null) return;
  if(known.has(idx)) known.delete(idx); else known.add(idx);
  render();
}

document.getElementById('card').onclick=flip;
document.getElementById('nextBtn').onclick=next;
document.getElementById('prevBtn').onclick=prev;
document.getElementById('shuffleBtn').onclick=shuffle;
document.getElementById('resetBtn').onclick=resetOrder;
document.getElementById('knownBtn').onclick=toggleKnown;
document.getElementById('hideKnownBtn').onclick=function(){
  hideKnown=!hideKnown; pos=0;
  this.textContent='Hide known: '+(hideKnown?'on':'off');
  render();
};
topicFilter.onchange=function(){ topic=this.value; pos=0; render(); };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
  else if(e.key===' '){e.preventDefault();flip();}
  else if(e.key.toLowerCase()==='k') toggleKnown();
});
render();
</script>
</body>
</html>
